<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, viewport-fit=cover"
		/>

		<!-- iOS Safari URL bar & PWA chrome color. JS in AppShell keeps these
		     in sync with the in-app theme store on light/dark toggle. -->
		<meta name="theme-color" content="#f4f2ec" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#0d1a15" media="(prefers-color-scheme: dark)" />

		<!-- PWA / "Add to Home Screen" on iOS. -->
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="OpenIbex" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="application-name" content="OpenIbex" />

		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="/icon.svg" />

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
