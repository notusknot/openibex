services:
  openibex:
    build: .
    container_name: openibex
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
      - OPENIBEX_ENV=production
      - NODE_ENV=production
      - DATABASE_URL=file:/data/openibex.db
      - OPENIBEX_DATA_DIR=/data
      - OPENIBEX_UPLOAD_DIR=/data/uploads
      - OPENIBEX_STREAM_DIR=/data/streams
      - OPEN_REGISTRATION=${OPEN_REGISTRATION:-false}
      - SESSION_SECRET=${SESSION_SECRET}
      - SESSION_TTL_DAYS=${SESSION_TTL_DAYS:-30}
    volumes:
      - ./data:/data
    restart: unless-stopped
