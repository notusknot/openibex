services:
  openibex:
    build: .
    container_name: openibex
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - PORT=3000
      - OPENIBEX_ENV=production
      - NODE_ENV=production
      - DATABASE_URL=file:/data/openibex.db
      - OPENIBEX_DATA_DIR=/data
      - OPENIBEX_UPLOAD_DIR=/data/uploads
      - OPENIBEX_STREAM_DIR=/data/streams
      - OPENIBEX_EXPORT_DIR=/data/exports
      - OPENIBEX_IMPORT_DIR=/data/imports
      - OPEN_REGISTRATION=${OPEN_REGISTRATION:-false}
      - SESSION_SECRET=${SESSION_SECRET}
      - SESSION_TTL_DAYS=${SESSION_TTL_DAYS:-30}
      # SvelteKit adapter-node needs ORIGIN set in production so form actions
      # pass the built-in CSRF check (compares request Origin header to this).
      # Override to https://your.domain when running behind a reverse proxy.
      - ORIGIN=${ORIGIN:-http://localhost:3000}
    volumes:
      # The container runs as uid 1000 (non-root); ensure ./data on the host is
      # writable by uid 1000 (e.g. `chown -R 1000:1000 ./data`).
      - ./data:/data
    restart: unless-stopped
    # Let the graceful-shutdown handler drain in-flight writes + checkpoint the
    # WAL before Docker escalates to SIGKILL (the drain timeout is 10s).
    stop_grace_period: 30s
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:'+(process.env.PORT||3000)+'/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
