<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#f4f2ec" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#0f241d" media="(prefers-color-scheme: dark)" />
		<title>Offline · OpenIbex</title>
		<!-- Fully self-contained: no external CSS, fonts, or scripts, so this
		     page renders when the network and the server are unreachable. -->
		<style>
			:root {
				--bg: #f4f2ec;
				--ink: #13332a;
				--muted: #5d6b62;
				--accent: #13332a;
			}
			@media (prefers-color-scheme: dark) {
				:root {
					--bg: #0f241d;
					--ink: #eae7dc;
					--muted: #9bab9f;
					--accent: #e7c24b;
				}
			}
			* {
				box-sizing: border-box;
			}
			html,
			body {
				margin: 0;
				height: 100%;
			}
			body {
				background: var(--bg);
				color: var(--ink);
				font-family:
					ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial,
					sans-serif;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 24px;
				-webkit-font-smoothing: antialiased;
			}
			main {
				max-width: 340px;
				width: 100%;
				text-align: center;
			}
			.mark {
				width: 72px;
				height: 72px;
				border-radius: 18px;
				background: #13332a;
				color: #e7c24b;
				display: inline-flex;
				align-items: center;
				justify-content: center;
				font-family: ui-monospace, 'JetBrains Mono', SFMono-Regular, Menlo, monospace;
				font-weight: 700;
				font-size: 30px;
				letter-spacing: -1px;
				margin-bottom: 20px;
			}
			h1 {
				font-size: 20px;
				margin: 0 0 8px;
				letter-spacing: -0.01em;
			}
			p {
				margin: 0 0 24px;
				color: var(--muted);
				line-height: 1.5;
				font-size: 15px;
			}
			button {
				appearance: none;
				border: 1px solid var(--accent);
				background: var(--accent);
				color: var(--bg);
				font: inherit;
				font-weight: 600;
				padding: 11px 22px;
				border-radius: 10px;
				cursor: pointer;
				touch-action: manipulation;
			}
			button:active {
				opacity: 0.85;
			}
		</style>
	</head>
	<body>
		<main>
			<div class="mark" aria-hidden="true">OI</div>
			<h1>You're offline</h1>
			<p>
				OpenIbex needs a connection to your server to load your training data. Check that
				you're on the network (or Tailscale) and try again.
			</p>
			<button type="button" onclick="location.reload()">Try again</button>
		</main>
	</body>
</html>
